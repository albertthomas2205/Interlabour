{% extends "adminpanel/base.html" %}
{% load i18n %}

{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<section class="panel">
    <div class="head">
        <h3>{{ title }}</h3>
    </div>
    <div class="body" style="padding: 18px;">
        <p>{% trans "Are you sure you want to delete" %} <strong>“{{ object }}”</strong>?</p>
        <form method="post" style="margin-top: 14px;">
            {% csrf_token %}
            <div style="display:flex; gap:8px;">
                <button class="btn danger" type="submit">{% trans "Delete" %}</button>
                <a class="btn ghost" href="javascript:history.back()">{% trans "Cancel" %}</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
