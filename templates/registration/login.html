<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inter Labour Login</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: radial-gradient(circle at top, #d8e8ff, #f6f9ff 45%, #edf7f4);
        }

        .card {
            width: min(420px, 92vw);
            background: #fff;
            border: 1px solid #dce6f8;
            border-radius: 18px;
            padding: 24px;
            box-shadow: 0 20px 36px rgba(13, 61, 156, 0.12);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 1.4rem;
        }

        p {
            margin: 0 0 16px;
            color: #4e6686;
            font-size: 0.95rem;
        }

        label {
            display: block;
            margin-top: 10px;
            font-size: 0.9rem;
            color: #1f3653;
        }

        input {
            width: 100%;
            margin-top: 6px;
            border: 1px solid #c9d8f2;
            border-radius: 10px;
            padding: 10px;
            font: inherit;
        }

        button {
            margin-top: 14px;
            width: 100%;
            border: 0;
            border-radius: 10px;
            padding: 10px;
            color: #fff;
            background: #1150c1;
            font: inherit;
            cursor: pointer;
        }

        .err {
            margin-top: 10px;
            padding: 8px 10px;
            border: 1px solid #ffd2d8;
            background: #fff4f6;
            color: #8d2940;
            border-radius: 10px;
            font-size: 0.88rem;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Inter Labour Dashboard</h1>
        <p>Login with your account email and password.</p>
        <form method="post">
            {% csrf_token %}
            {{ form.username.label_tag }}
            {{ form.username }}
            {{ form.password.label_tag }}
            {{ form.password }}
            <button type="submit">Login</button>
        </form>
        {% if form.errors %}
            <div class="err">Invalid credentials. Try again.</div>
        {% endif %}
    </div>
</body>
</html>
