services:
  - type: web
    name: interlabour-backend
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/
    envVars:
      - key: PORT
        value: "10000"
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: interlabour-db
          property: connectionString
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: PUBLIC_SITE_URL
        sync: false
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_USE_SSL
        value: "False"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: SUPPORT_EMAIL_HOST_USER
        sync: false
      - key: SUPPORT_EMAIL_HOST_PASSWORD
        sync: false
      - key: SUPPORT_FROM_EMAIL
        sync: false
      - key: HR_EMAIL_HOST_USER
        sync: false
      - key: HR_EMAIL_HOST_PASSWORD
        sync: false
      - key: HR_FROM_EMAIL
        sync: false
      - key: OTP_FROM_EMAIL
        sync: false
      - key: OTP_FROM_MAILBOX
        sync: false
      - key: EMAIL_INLINE_LOGO
        value: "True"
      - key: DJANGO_SUPERUSER_USERNAME
        value: "admin"
      - key: DJANGO_SUPERUSER_EMAIL
        value: "admin@gmail.com"
      - key: DJANGO_SUPERUSER_PASSWORD
        value: "admin123"
      - key: BOOTSTRAP_USER_USERNAME
        value: "albert"
      - key: BOOTSTRAP_USER_EMAIL
        value: "albert@gmail.com"
      - key: BOOTSTRAP_USER_PASSWORD
        value: "albert 123"
      # Set all sync:false mail values securely in Render before testing OTP and e-mail sending.

databases:
  - name: interlabour-db
    plan: free
