services:
  - type: web
    name: interlabour-backend
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health/
    envVars:
      - key: PORT
        value: "10000"
      - key: DJANGO_SECRET_KEY
        value: "replace-with-a-strong-secret"
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com,127.0.0.1,localhost"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com,http://127.0.0.1:8000,http://localhost:8000"
      - key: DATABASE_URL
        fromDatabase:
          name: interlabour-db
          property: connectionString
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://interlabour.onrender.com,http://127.0.0.1:8000,http://localhost:8000"
      - key: JWT_ACCESS_MINUTES
        value: "30"
      - key: JWT_REFRESH_DAYS
        value: "7"
      - key: OTP_EXPIRY_MINUTES
        value: "10"
      - key: OTP_MAX_ATTEMPTS
        value: "5"
      - key: ADMIN_REGISTRATION_CODE
        value: ""
      - key: PUBLIC_SITE_URL
        value: "https://interlabour.onrender.com"
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.smtp.EmailBackend"
      - key: EMAIL_HOST
        value: "smtp.zoho.in"
      - key: EMAIL_PORT
        value: "587"
      - key: EMAIL_USE_TLS
        value: "True"
      - key: EMAIL_USE_SSL
        value: "False"
      - key: EMAIL_HOST_USER
        value: "hr@interlabour.nl"
      - key: EMAIL_HOST_PASSWORD
        value: "1WwXZZUGxaiB"
      - key: DEFAULT_FROM_EMAIL
        value: "Interlabour <hr@interlabour.nl>"
      - key: SUPPORT_EMAIL_HOST_USER
        value: "support@interlabour.nl"
      - key: SUPPORT_EMAIL_HOST_PASSWORD
        value: "agYvJXuJ7Uep"
      - key: SUPPORT_FROM_EMAIL
        value: "Interlabour <support@interlabour.nl>"
      - key: HR_EMAIL_HOST_USER
        value: "hr@interlabour.nl"
      - key: HR_EMAIL_HOST_PASSWORD
        value: "1WwXZZUGxaiB"
      - key: HR_FROM_EMAIL
        value: "Interlabour <hr@interlabour.nl>"
      - key: OTP_FROM_EMAIL
        value: "Interlabour <support@interlabour.nl>"
      - key: OTP_FROM_MAILBOX
        value: "support@interlabour.nl"
      - key: EMAIL_INLINE_LOGO
        value: "True"
      - key: DJANGO_SUPERUSER_USERNAME
        value: "admin"
      - key: DJANGO_SUPERUSER_EMAIL
        value: "admin@gmail.com"
      - key: DJANGO_SUPERUSER_PASSWORD
        value: "admin123"
      - key: BOOTSTRAP_USER_USERNAME
        value: "albert"
      - key: BOOTSTRAP_USER_EMAIL
        value: "albert@gmail.com"
      - key: BOOTSTRAP_USER_PASSWORD
        value: "albert123"

databases:
  - name: interlabour-db
    plan: free
