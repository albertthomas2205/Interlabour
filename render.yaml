services:
  - type: web
    name: interlabor-backend
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: interlabor-db
          property: connectionString
      # Set these securely in Render (do NOT commit real values):
      # - DJANGO_SECRET_KEY
      # - DJANGO_SUPERUSER_USERNAME
      # - DJANGO_SUPERUSER_EMAIL
      # - DJANGO_SUPERUSER_PASSWORD

databases:
  - name: interlabor-db
    plan: free
